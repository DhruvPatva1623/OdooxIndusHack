version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: coreinventory_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: coreinventory
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7.0-alpine
    container_name: coreinventory_redis
    ports:
      - "6379:6379"

volumes:
  db_data:
